name: NightOwl Mobile Quality

on:
  push:
    paths:
      - 'apps/nightowl/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/nightowl-mobile-quality.yml'
  pull_request:
    paths:
      - 'apps/nightowl/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/nightowl-mobile-quality.yml'

jobs:
  mobile-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: NightOwl typecheck
        run: pnpm --filter nightowl exec tsc --noEmit

      - name: NightOwl tests
        run: pnpm --filter nightowl test
